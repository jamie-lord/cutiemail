<!doctype html>
<!--
  Source for the social-share card (Open Graph / Twitter). Not served by the site.
  Render to site/assets/og.png at 1200x630 with:
    "/Applications/Google Chrome.app/Contents/MacOS/Google Chrome" --headless=new \
      --screenshot=out.png --window-size=1200,630 --force-device-scale-factor=2 \
      --hide-scrollbars --default-background-color=00000000 --virtual-time-budget=8000 \
      file://.../og-card.html
  then downscale 2400x1260 -> 1200x630 with sharp.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@600;700;800&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bubblegum:#ff8fb2; --blush:#ffb3c9; --butter:#ffd166; --mint:#8fd6c8;
    --cream:#fff6f0; --ink:#4a1d33; --mauve:#7a5568; --pink:#ff6f9e;
    --tint-butter:#fff3cd; --tint-mint:#dff3ee; --tint-pink:#ffe4ee; --dash:#f3cdd9;
    --disp:'Baloo 2',system-ui,sans-serif; --body:'Nunito',system-ui,sans-serif;
    --mono:'JetBrains Mono',ui-monospace,Menlo,monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100vw;height:100vh;}
  body{
    background:var(--cream);
    font-family:var(--body);
    color:var(--ink);
    /* faint dotted texture, brand-adjacent, very low contrast */
    background-image:radial-gradient(var(--dash) 1.4px, transparent 1.4px);
    background-size:34px 34px;
    background-position:-8px -8px;
    overflow:hidden;
  }
  .frame{
    position:absolute; inset:26px;
    border:2.5px dashed var(--dash);
    border-radius:30px;
  }
  .card{
    position:absolute; inset:26px;
    display:flex; align-items:center; gap:60px;
    padding:64px 72px;
  }
  .mascot{flex:0 0 auto; width:352px;}
  .mascot svg{width:100%; height:auto; display:block;}
  .copy{flex:1 1 auto; min-width:0;}
  .wordmark{
    font-family:var(--disp); font-weight:800; font-size:112px; line-height:.9;
    letter-spacing:-2px; color:var(--ink);
  }
  .tagline{
    font-family:var(--disp); font-weight:700; font-size:44px; line-height:1.05;
    margin-top:14px; color:var(--ink);
  }
  .tagline .hl{
    background:linear-gradient(transparent 58%, var(--butter) 58%, var(--butter) 92%, transparent 92%);
    padding:0 2px;
  }
  .sub{
    font-family:var(--body); font-weight:600; font-size:25px; line-height:1.4;
    color:var(--mauve); margin-top:22px; max-width:640px;
  }
  .chips{display:flex; gap:14px; margin-top:30px; flex-wrap:wrap;}
  .chip{
    font-family:var(--mono); font-weight:600; font-size:18px; color:var(--ink);
    background:#fff; border:2.5px solid var(--ink); border-radius:999px;
    padding:9px 18px; box-shadow:3px 3px 0 var(--ink);
  }
  .chip.b{background:var(--tint-butter); box-shadow:3px 3px 0 var(--butter),3px 3px 0 .5px var(--ink);}
  .chip.m{background:var(--tint-mint);}
  .chip.p{background:var(--tint-pink);}
  .url{
    position:absolute; right:60px; bottom:44px;
    font-family:var(--mono); font-weight:700; font-size:22px; color:var(--mauve);
  }
  .url .heart{color:var(--pink);}
</style>
</head>
<body>
  <div class="frame"></div>
  <div class="card">
    <div class="mascot">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 172 150" role="img" aria-label="Cuti, the cutiemail mascot">
        <rect x="13" y="27" width="150" height="110" rx="22" fill="#ffd166"/>
        <rect x="6" y="20" width="150" height="110" rx="22" fill="#ffb3c9"/>
        <defs><clipPath id="env"><rect x="6" y="20" width="150" height="110" rx="22"/></clipPath></defs>
        <g clip-path="url(#env)">
          <path d="M81 -74 L158 -1 L81 72 L4 -1 Z" fill="#ff8fb2" stroke="#4a1d33" stroke-width="5" stroke-linejoin="round"/>
        </g>
        <rect x="6" y="20" width="150" height="110" rx="22" fill="none" stroke="#4a1d33" stroke-width="5"/>
        <ellipse cx="54" cy="92" rx="6" ry="8" fill="#4a1d33"/>
        <ellipse cx="108" cy="92" rx="6" ry="8" fill="#4a1d33"/>
        <ellipse cx="36" cy="96" rx="7" ry="4" fill="#ff6f9e"/>
        <ellipse cx="126" cy="96" rx="7" ry="4" fill="#ff6f9e"/>
        <path d="M72 100 Q81 108 90 100" fill="none" stroke="#4a1d33" stroke-width="5" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="copy">
      <div class="wordmark">cutiemail</div>
      <div class="tagline">the <span class="hl">SQLite</span> of email</div>
      <div class="sub">A small, self-contained mail server in TypeScript. It sends and receives real internet mail, with zero runtime dependencies.</div>
      <div class="chips">
        <span class="chip b">SMTP + IMAP</span>
        <span class="chip m">SPF · DKIM · DMARC</span>
        <span class="chip p">0 runtime deps</span>
        <span class="chip">MIT</span>
      </div>
    </div>
  </div>
  <div class="url">cuti.email <span class="heart">&hearts;</span></div>
</body>
</html>
