<!doctype html>
<!-- Source for the README hero banner. Not served. Render to site/assets/banner.png at 1280x420:
     chrome --headless=new --screenshot=out.png --window-size=1280,420 --force-device-scale-factor=2
       --virtual-time-budget=8000 file://.../banner.html  ; then downscale to 1280x420 with sharp. -->
<html lang="en">
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Nunito:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bubblegum:#ff8fb2; --blush:#ffb3c9; --butter:#ffd166; --cream:#fff6f0;
    --ink:#4a1d33; --mauve:#7a5568; --dash:#f3cdd9;
    --disp:'Baloo 2',system-ui,sans-serif; --body:'Nunito',system-ui,sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100vw;height:100vh;}
  body{
    background:var(--cream); color:var(--ink); overflow:hidden;
    background-image:radial-gradient(var(--dash) 1.4px, transparent 1.4px);
    background-size:34px 34px; background-position:-8px -8px;
  }
  .frame{position:absolute; inset:22px; border:2.5px dashed var(--dash); border-radius:26px;}
  .card{position:absolute; inset:22px; display:flex; align-items:center; gap:54px; padding:44px 64px;}
  .mascot{flex:0 0 auto; width:250px;}
  .mascot svg{width:100%; height:auto; display:block;}
  .wordmark{font-family:var(--disp); font-weight:800; font-size:96px; line-height:.9; letter-spacing:-1.5px;}
  .tagline{font-family:var(--disp); font-weight:700; font-size:38px; line-height:1.05; margin-top:12px;}
  .tagline .hl{background:linear-gradient(transparent 58%, var(--butter) 58%, var(--butter) 92%, transparent 92%); padding:0 2px;}
  .sub{font-family:var(--body); font-weight:600; font-size:22px; line-height:1.4; color:var(--mauve); margin-top:18px; max-width:640px;}
</style>
</head>
<body>
  <div class="frame"></div>
  <div class="card">
    <div class="mascot">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 172 150" role="img" aria-label="Cuti, the cutiemail mascot">
        <rect x="13" y="27" width="150" height="110" rx="22" fill="#ffd166"/>
        <rect x="6" y="20" width="150" height="110" rx="22" fill="#ffb3c9"/>
        <defs><clipPath id="env"><rect x="6" y="20" width="150" height="110" rx="22"/></clipPath></defs>
        <g clip-path="url(#env)"><path d="M81 -74 L158 -1 L81 72 L4 -1 Z" fill="#ff8fb2" stroke="#4a1d33" stroke-width="5" stroke-linejoin="round"/></g>
        <rect x="6" y="20" width="150" height="110" rx="22" fill="none" stroke="#4a1d33" stroke-width="5"/>
        <ellipse cx="54" cy="92" rx="6" ry="8" fill="#4a1d33"/><ellipse cx="108" cy="92" rx="6" ry="8" fill="#4a1d33"/>
        <ellipse cx="36" cy="96" rx="7" ry="4" fill="#ff6f9e"/><ellipse cx="126" cy="96" rx="7" ry="4" fill="#ff6f9e"/>
        <path d="M72 100 Q81 108 90 100" fill="none" stroke="#4a1d33" stroke-width="5" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="copy">
      <div class="wordmark">cutiemail</div>
      <div class="tagline">the <span class="hl">SQLite</span> of email</div>
      <div class="sub">A small, self-contained mail server in TypeScript. Zero runtime dependencies.</div>
    </div>
  </div>
</body>
</html>
