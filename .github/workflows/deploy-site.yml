# Builds the docs + marketing site from the repo's own markdown and deploys it to
# Cloudflare Workers (cuti.email) on every push to main that touches a published
# source. The build is a small hand-rolled generator — see site/build.mjs.
name: Deploy site

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'docs/**'
      - 'README.md'
      - 'CONTRIBUTING.md'
      - 'SECURITY.md'
      - '.github/workflows/deploy-site.yml'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: deploy-site
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Build the site
        working-directory: site
        run: |
          npm ci
          npm run build
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: site
          command: deploy
