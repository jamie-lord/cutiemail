# A minimal Cutiemail deployment for the container-native (NAS / homelab) path.
#
#   docker compose up -d          # build + run
#   docker compose logs -f        # the per-message + auth-failure log trail
#   docker compose exec mail node src/main.ts account add you   # manage accounts
#
# ONE volume holds all state (the control database + every per-user mailbox). Everything else
# is configured by environment, exactly like the bare-metal path — this file is just the
# systemd unit's equivalent for people who deploy in containers.
services:
  mail:
    build: .
    restart: unless-stopped
    ports:
      # host:container. Production uses the real ports on the host (25/587/993); the container
      # keeps its unprivileged defaults so nothing inside needs a privileged-port capability.
      - "25:2525"     # inbound SMTP
      - "587:5587"    # submission (STARTTLS + AUTH)
      - "993:5993"    # IMAPS
    environment:
      MAIL_DOMAIN: mail.example.com
      MAIL_HOST: 0.0.0.0
      MAIL_CONTROL_DB: /data/control.db
      # A REAL certificate is required for a public bind — the daemon refuses to serve the
      # bundled dev cert off loopback (its private key is public). Mount yours (below) and
      # point these at it; without them the container will refuse to start on 0.0.0.0.
      MAIL_TLS_CERT: /data/tls/cert.pem
      MAIL_TLS_KEY: /data/tls/key.pem
      # DKIM signing — generate with `docker compose exec mail node src/main.ts setup`, then
      # publish the printed DNS records. Omit for SPF-only (spam-foldered) outbound.
      MAIL_DKIM_KEY: /data/dkim/mail.key
      MAIL_DKIM_SELECTOR: s1
    volumes:
      # Persist all databases + secrets across restarts and image rebuilds. Back this up
      # (`node src/main.ts backup`) and encrypt it before it leaves the host.
      - mail-data:/data

volumes:
  mail-data:
