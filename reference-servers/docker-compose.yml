# Reference SMTP servers for calibrating the conformance suite.
#
# These are GROUND TRUTH, not servers under test. Postfix and Exim are the most
# spec-scrutinised MTAs alive, so when the suite reports a violation against one
# of them, the prior is that WE are wrong. Every such disagreement is triaged
# (see reference-servers/README.md) to: our bug / our misreading of the RFC / a
# genuine divergence. Only after that triage passes is the suite trustworthy
# enough to point at anything else.
#
# Usage:
#   cd reference-servers && docker compose up -d
#   # give the servers a few seconds to accept connections
#   node ../src/cli.ts run --config postfix.json           # vulnerable config (2526)
#   node ../src/cli.ts run --config postfix-hardened.json   # hardened config  (2528)
#   node ../src/cli.ts run --config exim.json               # exim            (2527)
#   docker compose down
#
# Two Postfix services on purpose. The pinned boky image is Postfix 3.7.11,
# whose default smtpd_forbid_bare_newline is `no` (the pre-CVE-2023-51764
# behaviour), so `postfix` exercises the UNMITIGATED end-of-data smuggling path
# and `postfix-hardened` (smtpd_forbid_bare_newline=yes) exercises the fix. The
# suite must flag the smuggling vectors on the first and clear them on the
# second; that two-config result is the calibration's strongest evidence
# (reference-servers/CALIBRATION-postfix.md).
#
# The smtpd restrictions are set to `permit` so the minimal reference config
# accepts the suite's RFC-2606 test envelope (MAIL FROM a .invalid domain to a
# recipient at the local domain) without a policy rejection masking the
# protocol-level questions under test. relay_restrictions keeps open-relay
# refusal intact so the non-relay-domain fixture still draws a 554.
#
# Versions are pinned so results are reproducible and the matrix report's
# version field is meaningful. Bump deliberately, and re-triage.

x-postfix-common: &postfix-common
  environment: &postfix-env
    ALLOWED_SENDER_DOMAINS: example.com
    POSTFIX_mynetworks: 127.0.0.1/32
    POSTFIX_smtpd_client_restrictions: permit
    POSTFIX_smtpd_helo_restrictions: permit
    POSTFIX_smtpd_sender_restrictions: permit
    POSTFIX_smtpd_recipient_restrictions: permit
    POSTFIX_smtpd_relay_restrictions: permit_mynetworks,reject_unauth_destination
    POSTFIX_mydestination: example.com
    POSTFIX_local_recipient_maps: static:all
  restart: unless-stopped

services:
  # Postfix, default (vulnerable) config: smtpd_forbid_bare_newline=no.
  # The reference for the mainstream interpretation of RFC 5321, and the
  # unmitigated end-of-data smuggling path (CVE-2023-51764 class).
  postfix:
    <<: *postfix-common
    image: boky/postfix:v4.3.0  # Postfix 3.7.11 — pin exactly; see README on version drift
    hostname: postfix.example.com
    ports:
      - '2526:25'

  # Postfix, hardened config: smtpd_forbid_bare_newline=yes. The same binary
  # with the smuggling mitigation on. The suite must POSITIVELY bless the
  # DATA-phase end-of-data vectors here (they move violated -> conformant),
  # while the command-phase bare-LF leniency Postfix keeps by design remains.
  postfix-hardened:
    <<: *postfix-common
    image: boky/postfix:v4.3.0
    hostname: postfix.example.com
    environment:
      <<: *postfix-env
      POSTFIX_smtpd_forbid_bare_newline: 'yes'
    ports:
      - '2528:25'

  # Exim, a second independent interpretation. Where Postfix and Exim disagree
  # on a requirement, that IS a divergence worth a register note.
  exim:
    image: exim/exim4:4.98  # pin; 4.97.1+ has the smuggling fix (CVE-2023-51766)
    hostname: exim.example.com
    ports:
      - '2527:25'
    restart: unless-stopped
